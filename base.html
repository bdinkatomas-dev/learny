<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Learny</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { 
            --bg: #000; --card: #171717; --border: #2d2d2d; 
            --blue: #8ab4f8; --text: #e8eaed; --sub: #9aa0a6; 
        }
        body { 
            font-family: 'Google Sans', Roboto, sans-serif; 
            background: #0b0b0b; color: var(--text); 
            margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; 
        }
        .app-container { 
            width: 100%; max-width: 450px; background: var(--bg); 
            display: flex; flex-direction: column; position: relative; 
            border-left: 1px solid var(--border); border-right: 1px solid var(--border); 
        }
        header { padding: 20px; text-align: center; font-size: 1.4rem; font-weight: 500; border-bottom: 1px solid var(--border); }
        main { flex: 1; padding: 16px; overflow-y: auto; padding-bottom: 110px; scrollbar-width: none; }
        main::-webkit-scrollbar { display: none; }
        
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 28px; margin-bottom: 16px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        
        input, textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            border-radius: 16px; color: var(--text); padding: 14px; box-sizing: border-box; 
            margin-bottom: 10px; outline: none; font-family: inherit; font-size: 1rem;
        }
        .btn { 
            background: var(--blue); color: #202124; border: none; padding: 16px; 
            border-radius: 100px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; 
        }
        .btn:active { transform: scale(0.97); }
        .btn-outline { background: transparent; color: var(--sub); border: 1px solid var(--border); margin-top: 8px; }

        nav { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); display: flex; height: 85px; border-top: 1px solid var(--border); 
        }
        .nav-item { flex: 1; text-align: center; color: var(--sub); font-size: 0.75rem; cursor: pointer; padding-top: 15px; transition: 0.3s; }
        .nav-item.active { color: var(--blue); }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 4px; }
        
        .hidden { display: none; }
        #ai-res { margin-top: 15px; padding: 15px; border-radius: 20px; background: rgba(138, 180, 248, 0.1); border-left: 4px solid var(--blue); line-height: 1.6; color: var(--text); white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="app-container">
    <header>Learny</header>

    <main>
        <!-- HOME -->
        <div id="home-screen">
            <div class="card" style="background: linear-gradient(135deg, #171717 0%, #1e1e2e 100%);">
                <h2>Ahoj, <span id="welcome-name" style="color: var(--blue);">Learneru</span>! 👋</h2>
                <div class="stats-grid">
                    <div class="stat-box"><b style="color:var(--blue)">12</b><br><small>Lekcí</small></div>
                    <div class="stat-box"><b style="color:var(--blue)">3</b><br><small>Streak</small></div>
                </div>
            </div>
            <button class="btn" onclick="navigate('ai')">Spustit Learny AI ✨</button>
        </div>

        <!-- AI -->
        <div id="ai-screen" class="hidden">
            <div class="card">
                <h2 style="color:var(--blue)">✨ Learny AI</h2>
                <textarea id="ai-input" rows="4" placeholder="Na co se chceš zeptat?"></textarea>
                <button class="btn" id="ai-btn" onclick="askAI()">Vysvětlit látku</button>
                <div id="ai-res" class="hidden"></div>
            </div>
        </div>

        <!-- NASTAVENÍ -->
        <div id="account-screen" class="hidden">
            <div class="card">
                <h2>Nastavení</h2>
                <label style="font-size:0.8rem; color:var(--sub)">Tvé jméno</label>
                <input type="text" id="set-name" placeholder="Zadej jméno">
                <button class="btn" id="save-btn" onclick="saveSettings()">Uložit do prohlížeče</button>
                <p style="text-align: center; margin-top: 20px; color: var(--sub); font-size: 0.8rem;">Vše uloženo lokálně v zařízení.</p>
            </div>
        </div>
    </main>

    <nav id="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="navigate('home')"><span>🏠</span>Home</div>
        <div class="nav-item" id="nav-ai" onclick="navigate('ai')"><span>✨</span>Learny AI</div>
        <div class="nav-item" id="nav-account" onclick="navigate('account')"><span>⚙️</span>Nastavení</div>
    </nav>
</div>

<script>
    // --- KONFIGURACE ---
    const S_URL = 'https://supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZ3NsdmZ2cXB6b2VzaHh0ZWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzA1MzEsImV4cCI6MjA5MzA0NjUzMX0.voHPQOKw_OXtYjAbtAu9BSkdb5A3VNg3F-3UXO9j4dg';
    const HF_TOKEN = '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';

    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    // Nastavení (LocalStorage)
    function saveSettings() {
        const name = document.getElementById('set-name').value;
        localStorage.setItem('learny_name', name);
        document.getElementById('welcome-name').innerText = name || "Learneru";
        
        const btn = document.getElementById('save-btn');
        btn.innerText = "✅ Uloženo";
        setTimeout(() => { btn.innerText = "Uložit do prohlížeče"; navigate('home'); }, 1000);
    }

    function loadSettings() {
        const name = localStorage.getItem('learny_name');
        if(name) {
            document.getElementById('set-name').value = name;
            document.getElementById('welcome-name').innerText = name;
        }
    }

    // --- FUNKČNÍ AI SEKCE ---
    async function askAI() {
        const input = document.getElementById('ai-input').value;
        const resDiv = document.getElementById('ai-res');
        const btn = document.getElementById('ai-btn');
        if (!input) return;

        btn.innerText = "✨ Přemýšlím...";
        btn.disabled = true;
        resDiv.classList.remove('hidden');
        resDiv.innerText = "Kontaktuji mozkovnu...";

        try {
            const response = await fetch("https://huggingface.co", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    inputs: `Otázka: ${input}\nVysvětli mi to stručně a přátelsky v češtině jako učitel:\n`,
                    parameters: { max_new_tokens: 400, return_full_text: false }
                })
            });

            const data = await response.json();

            if (response.status === 503) {
                resDiv.innerText = "AI se právě probouzí (trvá to cca 20s). Zkus to za chvíli znovu.";
            } else if (data.error) {
                resDiv.innerText = "Chyba: " + data.error;
            } else {
                let reply = Array.isArray(data) ? data[0].generated_text : data.generated_text;
                resDiv.innerText = reply.trim();
            }
        } catch (e) { 
            resDiv.innerText = "Chyba připojení k serveru."; 
            console.error(e);
        } finally { 
            btn.innerText = "Vysvětlit látku"; 
            btn.disabled = false; 
        }
    }

    // Navigace
    function navigate(screen) {
        ['home', 'ai', 'account'].forEach(s => {
            document.getElementById(s + '-screen').classList.add('hidden');
            document.getElementById('nav-' + s).classList.remove('active');
        });
        document.getElementById(screen + '-screen').classList.remove('hidden');
        document.getElementById('nav-' + screen).classList.add('active');
    }

    window.onload = () => {
        loadSettings();
        navigate('home');
    };
</script>
</body>
</html>
