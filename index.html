<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studijní AI</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #output { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; white-space: pre-wrap; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h3>Studijní AI Pomocník</h3>
    <div id="output">Ahoj! Zeptej se na cokoliv...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Napiš otázku...">
        <button id="sendBtn">Odeslat</button>
    </div>
</div>

<script>
    // 1. VLOŽ SVŮJ KLÍČ SEM
    const API_KEY = "AIzaSyA5QzF-P4ApmCyHtePJBUT47_y3q7fUUHo"; 

    const btn = document.getElementById('sendBtn');
    const input = document.getElementById('userInput');
    const output = document.getElementById('output');

    async function askAI() {
        const prompt = input.value.trim();
        if (!prompt) return;

        // UI: Příprava
        btn.disabled = true;
        output.innerText = "Přemýšlím...\n";
        
        try {
            // Používáme přímé volání bez externích knihoven (vyhne se MIME chybě)
            const response = await fetch(`https://googleapis.com{API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Jsi studijní asistent. Odpovídej česky k věci. Otázka: " + prompt }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                output.innerText = "Chyba: " + data.error.message;
            } else {
                // Vytažení textu z odpovědi Gemini
                const aiText = data.candidates[0].content.parts[0].text;
                output.innerText = aiText;
            }
        } catch (err) {
            output.innerText = "Chyba připojení. Zkontroluj konzoli (F12).";
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }

    btn.onclick = askAI;
    input.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
