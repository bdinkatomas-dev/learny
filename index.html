<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studijní AI Pomocník</title>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; }
        .user { background: #f0f0f0; text-align: right; }
        .ai { background: #e8f0fe; color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Learn-AI Assistant</h2>
    <div id="chat">
        <div class="msg ai">Ahoj! Jsem tvůj studijní asistent. S čím ti dnes pomůžu?</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Zadej otázku...">
        <button id="sendBtn">Odeslat</button>
    </div>
</div>

<script type="module">
    // Použití esm.sh je pro Vercel nejstabilnější cesta k importu Google SDK
    import { GoogleGenerativeAI } from "https://esm.sh";

    // --- ZDE VLOŽ SVŮJ KLÍČ ---
    const API_KEY = "SEM_VLOŽTE_VÁŠ_KLÍČ"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    async function askAI() {
        const text = input.value.trim();
        if (!text) return;

        // Přidání zprávy uživatele
        appendMsg("user", text);
        input.value = "";
        btn.disabled = true;

        // Příprava pole pro AI
        const aiMsgDiv = appendMsg("ai", "Přemýšlím...");

        try {
            // Používáme model Flash (rychlý a zdarma)
            const model = genAI.getGenerativeModel({ 
                model: "gemini-1.5-flash",
                systemInstruction: "Jsi stručný a jasný studijní asistent. Odpovídej v češtině."
            });

            const result = await model.generateContent(text);
            const response = await result.response;
            aiMsgDiv.innerText = response.text();

        } catch (error) {
            aiMsgDiv.innerText = "Chyba: " + error.message;
            aiMsgDiv.style.color = "red";
        } finally {
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    btn.onclick = askAI;
    input.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
