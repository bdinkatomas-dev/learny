<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learny Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #e8eaed;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

.card {
    background: #171717;
    border: 1px solid #2d2d2d;
    border-radius: 24px;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: 1px solid #2d2d2d;
    background: #111;
    color: white;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    font-weight: bold;
}

.primary {
    background: #8ab4f8;
    color: #000;
}

.secondary {
    background: #222;
    color: white;
    border: 1px solid #2d2d2d;
}

.google {
    background: white;
    color: black;
}

small {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #9aa0a6;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>📚 Learny</h1>

<!-- GOOGLE LOGIN -->
<button class="google" onclick="googleLogin()">
Přihlásit přes Google
</button>

<small>nebo pokračuj e-mailem</small>

<!-- EMAIL -->
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Heslo">

<!-- BUTTONY -->
<button class="primary" onclick="signUp()">
Vytvořit účet
</button>

<button class="secondary" onclick="login()">
Přihlásit se
</button>

<p id="status" style="text-align:center;color:#9aa0a6"></p>

</div>

</div>

<script>
// 🔗 SUPABASE (doplň svoje)
const supabase = supabase.createClient(
  "TVŮJ_SUPABASE_URL",
  "TVŮJ_SUPABASE_ANON_KEY"
);

// 🟢 REGISTER
async function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({
        email,
        password
    });

    document.getElementById("status").innerText =
        error ? error.message : "Účet vytvořen ✔";
}

// 🔵 LOGIN
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    document.getElementById("status").innerText =
        error ? error.message : "Přihlášeno ✔";
}

// 🌐 GOOGLE LOGIN
async function googleLogin() {
    const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
            redirectTo: window.location.origin
        }
    });

    if (error) {
        document.getElementById("status").innerText = error.message;
    }
}
</script>

</body>
</html>
