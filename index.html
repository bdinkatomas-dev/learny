<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studijní AI Pomocník</title>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); font-size: 1.5rem; margin-top: 0; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 10px; background: #fff; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .msg { margin-bottom: 15px; line-height: 1.5; }
        .user { color: #555; font-weight: bold; }
        .ai { color: #333; background: #e8f0fe; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Learn-AI Assistant</h1>
    <div id="chat">
        <div class="msg ai">Ahoj! Jsem tvůj studijní asistent. S čím ti dnes pomůžu?</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Zadej otázku nebo téma...">
        <button id="sendBtn">Odeslat</button>
    </div>
</div>

<script>
    // --- KONFIGURACE ---
    const API_KEY = "AIzaSyA5QzF-P4ApmCyHtePJBUT47_y3q7fUUHo"; // Získat na https://google.com
    const MODEL_URL = `https://googleapis.com{API_KEY}`;

    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    async function askGemini() {
        const text = input.value.trim();
        if (!text) return;

        // UI: Přidání dotazu uživatele
        appendMessage("user", "Vy: " + text);
        input.value = "";
        btn.disabled = true;

        // UI: Příprava pole pro AI
        const aiMsgDiv = appendMessage("ai", "Přemýšlím...");

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "Jsi profesionální studijní asistent. Odpovídej stručně a jasně v češtině. Otázka: " + text }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const aiResponse = data.candidates[0].content.parts[0].text;
            aiMsgDiv.innerText = aiResponse;

        } catch (error) {
            aiMsgDiv.style.color = "red";
            aiMsgDiv.innerText = "Chyba: " + error.message;
            console.error("Detail chyby:", error);
        } finally {
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = "msg " + role;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    btn.addEventListener('click', askGemini);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') askGemini(); });
</script>

</body>
</html>
