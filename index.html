<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Learny AI</title>
    <style>
        :root { 
            --bg: #000; --card: #171717; --border: #2d2d2d; 
            --blue: #8ab4f8; --text: #e8eaed; --sub: #9aa0a6; 
        }
        body { 
            font-family: 'Google Sans', Roboto, sans-serif; 
            background: #0b0b0b; color: var(--text); 
            margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; 
        }
        .app-container { 
            width: 100%; max-width: 450px; background: var(--bg); 
            display: flex; flex-direction: column; position: relative; 
            border-left: 1px solid var(--border); border-right: 1px solid var(--border); 
        }
        header { padding: 20px; text-align: center; font-size: 1.4rem; font-weight: 500; border-bottom: 1px solid var(--border); }
        main { flex: 1; padding: 16px; overflow-y: auto; padding-bottom: 110px; scrollbar-width: none; }
        main::-webkit-scrollbar { display: none; }
        
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 28px; margin-bottom: 16px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        
        textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            border-radius: 16px; color: var(--text); padding: 14px; box-sizing: border-box; 
            margin-bottom: 10px; outline: none; font-family: inherit; font-size: 1rem; resize: none;
        }
        .btn { 
            background: var(--blue); color: #202124; border: none; padding: 16px; 
            border-radius: 100px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; 
        }
        .btn:active { transform: scale(0.97); }

        nav { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); display: flex; height: 85px; border-top: 1px solid var(--border); 
        }
        .nav-item { flex: 1; text-align: center; color: var(--sub); font-size: 0.75rem; cursor: pointer; padding-top: 15px; }
        .nav-item.active { color: var(--blue); }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 4px; }
        
        .hidden { display: none; }
        #ai-res { margin-top: 15px; padding: 15px; border-radius: 20px; background: rgba(138, 180, 248, 0.1); border-left: 4px solid var(--blue); line-height: 1.6; color: var(--text); white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="app-container">
    <header>Learny</header>

    <main>
        <!-- HOME -->
        <div id="home-screen">
            <div class="card" style="background: linear-gradient(135deg, #171717 0%, #1e1e2e 100%);">
                <h2>Ahoj! 👋</h2>
                <p>Tvůj osobní AI učitel je připraven ti pomoci.</p>
                <div class="stats-grid">
                    <div class="stat-box"><b style="color:var(--blue)">0</b><br><small>Lekcí</small></div>
                    <div class="stat-box"><b style="color:var(--blue)">1</b><br><small>Streak</small></div>
                </div>
            </div>
            <button class="btn" onclick="navigate('ai')">Zeptat se AI ✨</button>
        </div>

        <!-- AI SECTION -->
        <div id="ai-screen" class="hidden">
            <div class="card">
                <h2 style="color:var(--blue)">✨ Learny AI</h2>
                <p style="font-size: 0.85rem; color: var(--sub);">Stabilní verze poháněná Google Gemini.</p>
                <textarea id="ai-input" rows="4" placeholder="Zadej téma, kterému nerozumíš..."></textarea>
                <button class="btn" id="ai-btn" onclick="askAI()">Vysvětlit látku</button>
                <div id="ai-res" class="hidden"></div>
            </div>
        </div>

        <!-- ACCOUNT (Coming Soon) -->
        <div id="account-screen" class="hidden">
            <div class="card" style="text-align: center; padding: 40px 10px;">
                <span style="font-size: 3rem;">⚙️</span>
                <h2>Nastavení</h2>
                <p>Cloudové účty: <b>Coming Soon</b></p>
                <div style="height: 1px; background: var(--border); margin: 20px 0;"></div>
                <p style="font-size: 0.8rem; color: var(--sub);">Verze 1.1.0 | Gemini Pro Engine</p>
            </div>
        </div>
    </main>

    <nav id="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="navigate('home')"><span>🏠</span>Home</div>
        <div class="nav-item" id="nav-ai" onclick="navigate('ai')"><span>✨</span>AI</div>
        <div class="nav-item" id="nav-account" onclick="navigate('account')"><span>⚙️</span>Účet</div>
    </nav>
</div>

<script>
    // --- TVŮJ API KLÍČ ---
    const GEMINI_KEY = 'AIzaSyA5QzF-P4ApmCyHtePJBUT47_y3q7fUUHo';

    // NAVIGACE
    function navigate(screen) {
        ['home', 'ai', 'account'].forEach(s => {
            document.getElementById(s + '-screen').classList.add('hidden');
            document.getElementById('nav-' + s).classList.remove('active');
        });
        document.getElementById(screen + '-screen').classList.remove('hidden');
        document.getElementById('nav-' + screen).classList.add('active');
    }

    // AI FUNKCE (Google Gemini)
    async function askAI() {
        const input = document.getElementById('ai-input').value;
        const resDiv = document.getElementById('ai-res');
        const btn = document.getElementById('ai-btn');
        if (!input) return;

        btn.innerText = "✨ Přemýšlím...";
        btn.disabled = true;
        resDiv.classList.remove('hidden');
        resDiv.innerText = "Learny generuje vysvětlení...";

        try {
            const response = await fetch(`https://googleapis.com{GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: `Jsi přátelský učitel Learny. Stručně a jasně v češtině vysvětli: ${input}` }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                resDiv.innerText = "Chyba API: Zkontroluj, zda je tvůj klíč aktivní.";
                console.error(data);
            }
        } catch (e) {
            resDiv.innerText = "Chyba připojení. Zkus to znovu.";
            console.error(e);
        } finally {
            btn.innerText = "Vysvětlit látku";
            btn.disabled = false;
        }
    }

    window.onload = () => navigate('home');
</script>
</body>
</html>
