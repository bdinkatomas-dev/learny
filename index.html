<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugging Face GUI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        #chat-window { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; }
        #output { height: 300px; overflow-y: auto; border-bottom: 2px solid #eee; margin-bottom: 20px; padding: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; }
        .user { background: #e3f2fd; align-self: flex-end; color: #1565c0; }
        .ai { background: #f1f8e9; color: #2e7d32; }
        .controls { display: flex; gap: 10px; width: 100%; max-width: 600px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background: #5c6bc0; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #3f51b5; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div id="output">
            <div class="msg ai">Ahoj! Napiš něco a já to doplním pomocí modelu GPT-2.</div>
        </div>
    </div>
    
    <div class="controls">
        <input type="text" id="userInput" placeholder="Zadejte text...">
        <button id="sendBtn">Odeslat</button>
    </div>

    <script type="module">
        // Import oficiální HF knihovny z CDN
        import { HfInference } from 'https://jsdelivr.net';

        // --- NASTAVENÍ ---
        const HF_TOKEN = "SEM_VLOŽTE_VÁŠ_TOKEN"; // Najdete na: https://huggingface.co
        const hf = new HfInference(HF_TOKEN);

        const output = document.getElementById('output');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        async function generateText() {
            const prompt = input.value.trim();
            if (!prompt) return;

            // UI update
            btn.disabled = true;
            input.value = '';
            output.innerHTML += `<div class="msg user"><b>Vy:</b> ${prompt}</div>`;
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'msg ai';
            aiMsgDiv.innerHTML = '<b>AI:</b> Zamýšlím se...';
            output.appendChild(aiMsgDiv);
            output.scrollTop = output.scrollHeight;

            try {
                // Volání modelu
                const response = await hf.textGeneration({
                    model: 'gpt2',
                    inputs: prompt,
                    parameters: {
                        max_new_tokens: 50,
                        return_full_text: false
                    }
                });

                aiMsgDiv.innerHTML = `<b>AI:</b> ${response.generated_text}`;
            } catch (error) {
                console.error(error);
                aiMsgDiv.style.color = 'red';
                aiMsgDiv.innerHTML = `<b>Chyba:</b> ${error.message}. <br><small>Zkontrolujte token v kódu nebo zda model není přetížen.</small>`;
            } finally {
                btn.disabled = false;
                output.scrollTop = output.scrollHeight;
            }
        }

        btn.addEventListener('click', generateText);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') generateText(); });
    </script>
</body>
</html>
