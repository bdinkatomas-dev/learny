<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje HF GUI</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 400px; height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .user { color: blue; }
        .ai { color: green; font-weight: bold; }
        input { width: 320px; padding: 5px; }
    </style>
</head>
<body>

    <h2>Moje AI Rozhraní</h2>
    <div id="chat-box"></div>
    <div>
        <input type="text" id="user-input" placeholder="Napiš něco...">
        <button onclick="askAI()">Odeslat</button>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const prompt = input.value;
            if(!prompt) return;

            chatBox.innerHTML += `<p class="user"><b>Vy:</b> ${prompt}</p>`;
            input.value = '';

            // --- Hugging Face API Volání ---
            const API_TOKEN = "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"; // Získáte na huggingface.co/settings/tokens
            const MODEL_ID = "gpt2"; // Můžete změnit na jakýkoliv jiný model

            try {
                const response = await fetch(`https://huggingface.co{MODEL_ID}`, {
                    headers: { Authorization: `Bearer ${API_TOKEN}` },
                    method: "POST",
                    body: JSON.stringify({ inputs: prompt }),
                });
                
                const result = await response.json();
                const aiText = result[0].generated_text || "Chyba odpovědi";
                
                chatBox.innerHTML += `<p class="ai"><b>AI:</b> ${aiText}</p>`;
            } catch (error) {
                chatBox.innerHTML += `<p style="color:red">Chyba: ${error.message}</p>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
